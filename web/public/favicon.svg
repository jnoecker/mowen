<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1e1b18"/>
  <!-- Ink ripple rings — slightly irregular, brush-drawn feel -->
  <ellipse cx="16.2" cy="16" rx="13" ry="12" fill="none" stroke="#e8e0d4" stroke-width="0.8" opacity="0.2" transform="rotate(-2 16 16)"/>
  <ellipse cx="15.8" cy="16.2" rx="9.5" ry="8.8" fill="none" stroke="#e8e0d4" stroke-width="1" opacity="0.35" transform="rotate(1.5 16 16)"/>
  <ellipse cx="16.1" cy="15.9" rx="5.8" ry="5.4" fill="none" stroke="#e8e0d4" stroke-width="1.3" opacity="0.55" transform="rotate(-1 16 16)"/>
  <!-- Center ink drop — cinnabar -->
  <circle cx="16" cy="16" r="2.2" fill="#c8523c"/>
  <!-- Ink splash highlight -->
  <circle cx="15.3" cy="15.3" r="0.6" fill="#e8e0d4" opacity="0.15"/>
</svg>
